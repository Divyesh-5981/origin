<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <linearGradient id="spark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5000" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 2px #ff5000); }
      }
      @keyframes spin-slow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .pulse-spark {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: 16px 16px;
      }
      .spin-ring {
        animation: spin-slow 16s linear infinite;
        transform-origin: 16px 16px;
      }
    </style>
  </defs>

  <!-- Outer camera shutter/aperture ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.12" />
  
  <!-- Segmented camera iris blades (rotating) -->
  <g class="spin-ring" opacity="0.8">
    <path d="M 16 2 A 14 14 0 0 1 30 16 L 25 16 A 9 9 0 0 0 16 7 Z" fill="#00ffff" opacity="0.65" />
    <path d="M 16 30 A 14 14 0 0 1 2 16 L 7 16 A 9 9 0 0 0 16 25 Z" fill="#ff5000" opacity="0.65" />
  </g>

  <!-- Inner solid orbit line -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.25" />

  <!-- Center cinematic spark -->
  <path class="pulse-spark" d="M 16 11 L 17.2 14.8 L 21 16 L 17.2 17.2 L 16 21 L 14.8 17.2 L 11 16 L 14.8 14.8 Z" fill="url(#spark-grad)" />
</svg>
